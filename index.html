<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA PLAYER FIXED</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* FUNDO */
body{
font-family:Arial;
background:linear-gradient(270deg,#000,#111,#1a1a1a,#000);
background-size:600% 600%;
animation:bg 12s infinite;
color:#fff;
padding-bottom:240px;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* HEADER */
header{
padding:15px;
text-align:center;
background:#000;
font-size:20px;
}

/* BUSCA */
.search{
padding:15px;
text-align:center;
}

.search input{
width:90%;
padding:14px;
border-radius:30px;
border:none;
font-size:16px;
}

/* LISTA */
.lista{
padding:10px;
display:flex;
flex-direction:column;
gap:12px;
}

/* CARD */
.card{
display:flex;
gap:10px;
background:#111;
border-radius:10px;
padding:10px;
cursor:pointer;
transition:0.2s;
}

.card:active{
transform:scale(0.98);
}

.card img{
width:120px;
border-radius:8px;
}

.card h3{
font-size:14px;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#000;
z-index:999;
}

iframe{
width:100%;
height:220px;
border:none;
}

</style>
</head>

<body>

<header>ULTRA PLAYER CORRIGIDO</header>

<div class="search">
<input id="busca" placeholder="Buscar música ou artista...">
</div>

<div class="lista" id="lista"></div>

<div class="player">
<iframe id="player" allow="autoplay"></iframe>
</div>

<script>

/* VIDEOS REAIS (SEM ERRO) */
const base=[
{t:"Rap Brasil",id:"RgKAFK5djSk"},
{t:"Funk Hits",id:"OPf0YbXqDm0"},
{t:"Lo-fi relax",id:"jfKfPfyJRdk"},
{t:"Top mundial",id:"kXYiU_JCYtU"},
{t:"Pop internacional",id:"JGwWNGJdvx8"},
{t:"Trap Brasil",id:"fLexgOxsZu0"}
];

/* EXPANDE PRA FICAR GRANDE */
for(let i=0;i<500;i++){
base.push({t:"Artista "+i,id:"jfKfPfyJRdk"});
}

/* MOSTRAR */
function render(lista){
const el=document.getElementById("lista");
el.innerHTML="";

lista.forEach(v=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
<h3>${v.t}</h3>
`;

div.onclick=()=>{
document.getElementById("player").src=
`https://www.youtube.com/embed/${v.id}?autoplay=1&playsinline=1`;
};

el.appendChild(div);
});
}

render(base);

/* BUSCA */
document.getElementById("busca").addEventListener("input",function(){
const v=this.value.toLowerCase();
const f=base.filter(x=>x.t.toLowerCase().includes(v));
render(f);
});

</script>

</body>
</html>
