<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lamoniê Flow | Ultra Engine v7.0</title>
    
    <style>
        :root {
            --ios-blue: #007aff;
            --yt-red: #ff0000;
            --bg-ultra: #000000;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #888888;
            --safe-area: env(safe-area-inset-bottom);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background: var(--bg-ultra); color: var(--text); overflow-x: hidden; height: 100vh; }

        /* HEADER FIXO */
        .header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid #222;
        }

        .logo { font-weight: 800; font-size: 22px; letter-spacing: -1px; }
        .logo span { color: var(--yt-red); }

        /* CONTAINER DE CONTEÚDO */
        .app-content { padding-top: 70px; padding-bottom: 100px; height: 100vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        /* CARDS DE VÍDEO (ESTRUTURA DE ALTA FIDELIDADE) */
        .v-item { width: 100%; margin-bottom: 15px; background: var(--surface); transition: transform 0.2s; cursor: pointer; }
        .v-item:active { transform: scale(0.98); }
        .v-cover { width: 100%; aspect-ratio: 16/9; position: relative; background: #1a1a1a; }
        .v-cover img { width: 100%; height: 100%; object-fit: cover; }
        .v-duration { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        
        .v-meta { display: flex; padding: 15px; gap: 15px; }
        .v-avatar { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .v-details { flex: 1; }
        .v-title { font-size: 16px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
        .v-info { font-size: 13px; color: var(--text-dim); }

        /* O PLAYER "COLOSSAL" (RESOLVIDO) */
        #ultra-modal {
            position: fixed; inset: 0; background: var(--bg-ultra);
            z-index: 5000; display: none; flex-direction: column;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #ultra-modal.active { display: flex; transform: translateY(0); }

        .modal-nav { height: 60px; display: flex; align-items: center; padding: 0 20px; background: #111; justify-content: space-between; }
        .close-trigger { font-size: 30px; font-weight: 200; cursor: pointer; color: var(--ios-blue); }

        .video-engine-box { width: 100%; aspect-ratio: 16/9; background: #000; }
        .video-data-box { padding: 20px; flex: 1; overflow-y: auto; background: var(--bg-ultra); }
        .p-badge { background: var(--yt-red); padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: inline-block; }

        /* TAB BAR (BOTÕES QUE AGORA OBEDECEM) */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: calc(70px + var(--safe-area));
            background: rgba(10,10,10,0.98); backdrop-filter: blur(25px);
            border-top: 1px solid #222; display: flex; justify-content: space-around;
            padding-bottom: var(--safe-area); z-index: 2000;
        }
        .tab-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); gap: 5px; font-size: 10px; flex: 1; }
        .tab-btn.active { color: white; }
        .tab-btn svg { width: 24px; height: 24px; fill: currentColor; }

        /* BOTÃO CENTRAL DE AÇÃO */
        .btn-plus { width: 45px; height: 45px; border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 200; margin-top: 5px; }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Lamoniê <span>Flow</span></div>
        <div style="display: flex; gap: 20px;">
            <span>🔍</span>
            <div class="v-avatar" style="width: 28px; height: 28px; background: #004d40;"></div>
        </div>
    </header>

    <main class="app-content" id="feed-mount"></main>

    <div id="ultra-modal">
        <div class="modal-nav">
            <span class="close-trigger" onclick="killPlayer()">✕</span>
            <span style="font-weight: 600; font-size: 14px;">MODO PREMIUM</span>
            <span>⋮</span>
        </div>
        <div class="video-engine-box">
            <div id="yt-core-iframe"></div>
        </div>
        <div class="video-data-box">
            <span class="p-badge">SINAL ULTRA HD</span>
            <h1 id="p-title" style="font-size: 20px; margin-bottom: 10px;"></h1>
            <p id="p-stats" style="color: var(--text-dim); font-size: 13px;"></p>
            <div style="margin-top: 30px; height: 1px; background: #222;"></div>
            </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-btn active" onclick="console.log('Home clicada')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Início
        </div>
        <div class="tab-btn">
            <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
            Shorts
        </div>
        <div class="btn-plus">+</div>
        <div class="tab-btn">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>
            Subs
        </div>
        <div class="tab-btn">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
            Biblioteca
        </div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // BANCO DE DADOS DINÂMICO
        const videos = [
            { id: "5U7bE06_z7I", title: "O Melhor do Piseiro e Sanfona 2026 - Bibiu Galdino", views: "2.5M", time: "15:40" },
            { id: "4YmXW7XF66o", title: "Como Criar Apps Profissionais (Tutorial Ultra)", views: "180k", time: "42:10" },
            { id: "jfKfPfyJRdk", title: "Natureza Relaxante 8K Ultra HD", views: "12M", time: "10:00" },
            { id: "dQw4w9WgXcQ", title: "Never Gonna Give You Up - HD", views: "1.5B", time: "03:32" }
        ];

        let player;
        let isPlayerReady = false;

        // Função que monta o feed e garante que os botões funcionem
        function initApp() {
            const mount = document.getElementById('feed-mount');
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'v-item';
                // O segredo está aqui: o clique dispara a função e gerencia o estado
                card.onclick = () => launchVideo(v);
                card.innerHTML = `
                    <div class="v-cover">
                        <img src="https://i.ytimg.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
                        <div class="v-duration">${v.time}</div>
                    </div>
                    <div class="v-meta">
                        <div class="v-avatar"></div>
                        <div class="v-details">
                            <h3 class="v-title">${v.title}</h3>
                            <p class="v-info">Lamoniê Flow • ${v.views} visualizações • há 2 dias</p>
                        </div>
                    </div>
                `;
                mount.appendChild(card);
            });
        }

        // API DO YOUTUBE
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-core-iframe', {
                height: '100%',
                width: '100%',
                playerVars: { 'autoplay': 0, 'controls': 1, 'modestbranding': 1, 'rel': 0 },
                events: {
                    'onReady': () => { isPlayerReady = true; }
                }
            });
        }

        function launchVideo(v) {
            const modal = document.getElementById('ultra-modal');
            document.getElementById('p-title').innerText = v.title;
            document.getElementById('p-stats').innerText = `${v.views} views • Canal Oficial`;
            
            modal.style.display = 'flex';
            // Delay pequeno para a animação do iPhone (slide up)
            setTimeout(() => modal.classList.add('active'), 10);
            
            if (isPlayerReady) {
                player.loadVideoById(v.id);
            }
            document.body.style.overflow = 'hidden'; // Trava o scroll do fundo
        }

        function killPlayer() {
            const modal = document.getElementById('ultra-modal');
            modal.classList.remove('active');
            
            if (player && player.stopVideo) {
                player.stopVideo();
            }

            setTimeout(() => {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto'; // Destrava o scroll
            }, 500);
        }

        window.onload = initApp;
    </script>
</body>
</html>
