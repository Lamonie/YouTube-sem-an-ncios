<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER PRO SIMPLES</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    text-align: center;
}

h1 { margin: 20px; }

input {
    width: 70%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: red;
    color: white;
    font-weight: bold;
}

iframe {
    width: 90%;
    height: 400px;
    border-radius: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 PLAYER PRO FUNCIONANDO</h1>

<input id="link" placeholder="Cole link do YouTube">
<button onclick="tocar()">Tocar</button>

<iframe id="player"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen></iframe>

<script>
function getVideoId(url) {
    try {
        let u = new URL(url);
        if (u.hostname.includes("youtu.be")) {
            return u.pathname.slice(1);
        }
        return u.searchParams.get("v");
    } catch {
        return null;
    }
}

function tocar() {
    let url = document.getElementById("link").value;
    let id = getVideoId(url);

    if (id) {
        document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id;
    } else {
        alert("Cole um link válido do YouTube");
    }
}
</script>

</body>
</html>
