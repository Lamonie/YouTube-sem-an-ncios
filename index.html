<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYER PRO SIMPLES</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(270deg, #000, #111, #1a1a1a);
    background-size: 600% 600%;
    animation: bg 12s ease infinite;
    color: white;
    text-align: center;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

h1 { margin: 20px; }

input {
    width: 70%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: red;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

iframe {
    width: 90%;
    height: 400px;
    border: none;
    border-radius: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 PLAYER PRO SIMPLES</h1>

<input id="link" placeholder="Cole link do YouTube">
<button onclick="tocar()">Tocar</button>

<iframe id="player" src="" allowfullscreen></iframe>

<script>
function getVideoId(url) {
    let regExp = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
    let match = url.match(regExp);
    return match ? match[1] : null;
}

function tocar() {
    let url = document.getElementById("link").value;
    let id = getVideoId(url);

    if (id) {
        document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id;
    } else {
        alert("Link inválido!");
    }
}
</script>

</body>
</html>
