<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Premium Clone</title>
    <style>
        /* 1. RESET E CONFIGURAÇÕES GLOBAIS */
        :root {
            --cor-fundo: #0f0f0f;
            --cor-fundo-secundaria: #212121;
            --cor-superficie: #282828;
            --cor-borda: #3d3d3d;
            --cor-texto-primaria: #f1f1f1;
            --cor-texto-secundaria: #aaa;
            --cor-destaque: #ff0000;
            --cor-icone: #909090;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto-primaria);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(255, 0, 0, 0.1), transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(0, 100, 255, 0.1), transparent 30%);
            animation: backgroundAnimation 20s ease-in-out infinite;
        }

        @keyframes backgroundAnimation {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--cor-fundo-secundaria);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--cor-borda);
            border-radius: 4px;
        }

        /* 2. HEADER (BARRA SUPERIOR) */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: var(--cor-fundo-secundaria);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            border-bottom: 1px solid var(--cor-borda);
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .menu-icon {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.2s;
        }

        .menu-icon:hover {
            background-color: var(--cor-superficie);
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--cor-texto-primaria);
        }

        .logo svg {
            fill: var(--cor-destaque);
            height: 28px;
            margin-right: 4px;
        }

        .logo span {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: -1px;
        }

        .search-container {
            display: flex;
            align-items: center;
            flex-grow: 1;
            max-width: 600px;
        }

        .search-input {
            width: 100%;
            background-color: #121212;
            border: 1px solid var(--cor-borda);
            border-radius: 40px 0 0 40px;
            height: 40px;
            padding: 0 16px;
            color: var(--cor-texto-primaria);
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--cor-destaque);
        }

        .search-button {
            height: 40px;
            width: 64px;
            background-color: var(--cor-superficie);
            border: 1px solid var(--cor-borda);
            border-left: none;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .search-button:hover {
            background-color: #3f3f3f;
        }

        .header-icon {
            color: var(--cor-texto-primaria);
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }
        
        .header-icon:hover {
             background-color: var(--cor-superficie);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #5a3ab6;
            cursor: pointer;
        }

        /* 3. MENU LATERAL */
        .sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            width: 240px;
            height: calc(100% - 56px);
            background-color: var(--cor-fundo-secundaria);
            z-index: 999;
            padding-top: 12px;
            transform: translateX(0);
            transition: transform 0.3s ease;
        }
        
        .sidebar.closed {
            transform: translateX(-100%);
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            padding: 10px 24px;
            cursor: pointer;
            gap: 24px;
            text-decoration: none;
            color: var(--cor-texto-primaria);
            border-radius: 10px;
            margin: 0 12px 4px;
            transition: background-color 0.2s;
        }

        .sidebar-item.active, .sidebar-item:hover {
            background-color: var(--cor-superficie);
        }

        .sidebar-item span {
            font-size: 14px;
            font-weight: 500;
        }

        /* 4. CONTEÚDO PRINCIPAL (VÍDEOS) */
        .main-content {
            margin-top: 56px;
            margin-left: 240px;
            padding: 24px;
            transition: margin-left 0.3s ease;
        }
        
        .main-content.full-width {
            margin-left: 0;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .video-card {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: transform 0.2s ease, opacity 0.3s;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.5s forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-card:hover .thumbnail-container img {
            transform: scale(1.05);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--cor-superficie);
        }
        
        .thumbnail-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: var(--cor-texto-primaria);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .video-details {
            display: flex;
            gap: 12px;
        }
        
        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--cor-texto-secundaria);
        }

        .video-info {
            display: flex;
            flex-direction: column;
        }
        
        .video-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--cor-texto-primaria);
            margin-bottom: 6px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel, .video-stats {
            font-size: 14px;
            color: var(--cor-texto-secundaria);
        }
        
        /* 5. PLAYER DE VÍDEO */
        .video-player-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none; /* Alterado por JS */
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .video-player-overlay.visible {
            display: flex;
            opacity: 1;
        }

        .video-player-container {
            width: 90%;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
            background-color: #000;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .video-player-container video {
            width: 100%;
            height: 100%;
        }

        .close-player {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(40, 40, 40, 0.7);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: background-color 0.2s;
        }
        
        .close-player:hover {
            background: rgba(60, 60, 60, 0.9);
        }

        .custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .video-player-container:hover .custom-controls {
            opacity: 1;
        }

        .progress-bar-container {
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            border-radius: 2.5px;
            transition: height 0.2s ease;
        }
        
        .progress-bar-container:hover {
            height: 8px;
        }
        
        .progress-bar {
            height: 100%;
            width: 0;
            background-color: var(--cor-destaque);
            border-radius: 2.5px;
        }

        .controls-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-button {
            background: none;
            border: none;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
        }
        
        .volume-container {
            display: flex;
            align-items: center;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 80px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            border-radius: 2.5px;
            cursor: pointer;
            transition: opacity 0.2s;
            opacity: 0;
            width: 0;
        }
        
        .volume-container:hover .volume-slider {
            opacity: 1;
            width: 80px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }
        
        .time-display {
            font-size: 14px;
            font-variant-numeric: tabular-nums;
        }
        
        /* Ícones SVG */
        .icon-svg {
            fill: currentColor;
            width: 24px;
            height: 24px;
        }

        /* 6. RESPONSIVIDADE */
        @media (max-width: 1200px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .search-container {
                display: none; /* Simplificando o header em telas pequenas */
            }
            .header {
                padding: 0 16px;
            }
            .video-player-container {
                width: 100%;
                height: auto;
                aspect-ratio: 16 / 9;
                border-radius: 0;
            }
        }
        
        @media (max-width: 480px) {
            .video-grid {
                grid-template-columns: 1fr; /* Uma coluna */
                gap: 24px;
            }
            .main-content {
                padding: 16px;
            }
        }

    </style>
</head>
