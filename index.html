<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lamoniê Flow - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --fundo: #0f0f0f;
            --texto: #f1f1f1;
            --cinza: #aaa;
            --detalhe: #ff0000;
        }

        body {
            background-color: var(--fundo);
            color: var(--texto);
            margin: 0;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 70px;
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            background: var(--fundo);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 19px; letter-spacing: -1px; }
        .logo-icon { color: var(--detalhe); font-size: 24px; }

        /* LISTA DE VÍDEOS */
        .video-card { width: 100%; margin-bottom: 15px; cursor: pointer; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        
        .details { display: flex; padding: 12px; gap: 12px; }
        .avatar { width: 36px; height: 36px; background: #5a3ab6; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: white; }
        .info h3 { margin: 0; font-size: 14px; line-height: 1.4; font-weight: 500; color: white; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { color: var(--cinza); font-size: 12px; margin-top: 4px; }

        /* PLAYER PREMIUM (TELA CHEIA) */
        .player-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; z-index: 2000;
        }
        .player-overlay.active { display: flex; }
        .close-bar { 
            padding: 15px; 
            background: #111; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            font-weight: 500;
            cursor: pointer;
            color: white;
        }

        #iframe-container { flex-grow: 1; display: flex; align-items: center; background: #000; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* NAV BAR INFERIOR */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--fundo); border-top: 1px solid #282828;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--cinza); text-decoration: none; gap: 4px; }
        .nav-item.active { color: white; }
        .add-icon { font-size: 32px; font-weight: 200; }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><span class="logo-icon">▶</span> Premium</div>
        <div style="display: flex; gap: 18px; align-items: center;">
            <span style="font-size: 18px;">📺</span>
            <span style="font-size: 18px;">🔔</span>
            <span style="font-size: 18px;">🔍</span>
            <div class="avatar" style="width: 26px; height: 26px; background: #004d40; font-size: 12px;">B</div>
        </div>
    </header>

    <main id="video-list"></main>

    <div class="player-overlay" id="player">
        <div class="close-bar" onclick="closeVideo()">
            <span>✕ Fechar Vídeo</span>
            <span style="font-size: 12px; color: #ff0000; border: 1px solid #ff0000; padding: 2px 6px; border-radius: 4px;">PREMIUM</span>
        </div>
        <div id="iframe-container"></div>
        <div style="padding: 20px; color: #aaa; font-size: 13px;">
            <h3 id="playing-title" style="color: white; margin-bottom: 8px;"></h3>
            <p>Servidor: <strong>Lamoniê Private Node</strong></p>
            <p>Status: Sem anúncios detectados.</p>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active">🏠<span>Início</span></a>
        <a href="#" class="nav-item">⚡<span>Shorts</span></a>
        <div class="add-icon">⊕</div>
        <a href="#" class="nav-item">📺<span>Inscrições</span></a>
        <a href="#" class="nav-item">📚<span>Biblioteca</span></a>
    </nav>

    <script>
        // LISTA DE VÍDEOS (Você pode trocar os IDs se quiser outros)
        const videos = [
            { id: "5U7bE06_z7I", title: "O Melhor do Piseiro e Sanfona 2026 - Especial Bibiu Galdino", views: "1.2M", time: "3 dias", channel: "Canal Oficial" },
            { id: "4YmXW7XF66o", title: "Projeto Tela de Login com HTML e CSS - DevClub", views: "128k", time: "1 ano", channel: "DevClub" },
            { id: "jfKfPfyJRdk", title: "Natureza em 8K - Ultra HD Cinematic (Teste de Tela)", views: "5.4M", time: "2 semanas", channel: "Mundo Natureza" },
            { id: "dQw4w9WgXcQ", title: "Rick Astley - Never Gonna Give You Up (4K Remaster)", views: "1.5B", time: "há muito tempo", channel: "Rick Astley" }
        ];

        const container = document.getElementById('video-list');

        // Função que desenha a lista na tela
        function renderVideos() {
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openVideo(v.id, v.title);
                card.innerHTML = `
                    <div class="thumbnail">
                        <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://img.youtube.com/vi/${v.id}/0.jpg'">
                        <span class="duration">10:00</span>
                    </div>
                    <div class="details">
                        <div class="avatar">B</div>
                        <div class="info">
                            <h3>${v.title}</h3>
                            <div class="meta">${v.channel} • ${v.views} visualizações • ${v.time}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // A FUNÇÃO QUE ABRE O VÍDEO SEM PROPAGANDA
        function openVideo(id, title) {
            const player = document.getElementById('player');
            const iframeCon = document.getElementById('iframe-container');
            document.getElementById('playing-title').innerText = title;
            
            player.classList.add('active');
            
            // Usamos o yewtu.be que é um servidor que "limpa" o vídeo do YouTube
            iframeCon.innerHTML = `<iframe 
                src="https://yewtu.be/embed/${id}?autoplay=1&listen=false" 
                allow="autoplay; fullscreen" 
                style="width:100%; aspect-ratio:16/9; border:none;">
            </iframe>`;
            
            document.body.style.overflow = 'hidden'; // Trava o scroll da página atrás
        }

        // Função para fechar o player
        function closeVideo() {
            const player = document.getElementById('player');
            document.getElementById('iframe-container').innerHTML = '';
            player.classList.remove('active');
            document.body.style.overflow = 'auto'; // Libera o scroll
        }

        // Inicia tudo
        renderVideos();
    </script>
</body>
</html>
