<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Vídeos</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
font-family:Arial;
background:#0a0a0a;
color:#fff;
}

/* HEADER */
header{
padding:15px;
text-align:center;
font-size:20px;
background:#000;
}

/* BUSCA */
.search{
display:flex;
gap:10px;
padding:15px;
}

.search input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
font-size:15px;
}

.search button{
width:50px;
border:none;
border-radius:50%;
background:#1db954;
color:#fff;
font-size:18px;
}

/* GENEROS */
.generos{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
scroll-behavior:smooth;
}

.generos::-webkit-scrollbar{
display:none;
}

.generos button{
background:#111;
color:#fff;
border:none;
padding:10px 15px;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
}

/* LISTA */
.lista{
padding:10px;
display:flex;
flex-direction:column;
gap:12px;
overflow-y:auto;
height:calc(100vh - 300px);
}

/* CARD */
.card{
display:flex;
gap:10px;
background:#111;
border-radius:10px;
padding:10px;
cursor:pointer;
}

.card img{
width:120px;
border-radius:8px;
}

.card h3{
font-size:14px;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#000;
}

iframe{
width:100%;
height:200px;
border:none;
}

</style>
</head>

<body>

<header>Monet Vídeos</header>

<div class="search">
<input id="busca" placeholder="Buscar música...">
<button onclick="buscar()">🔍</button>
</div>

<div class="generos" id="generos"></div>

<div class="lista" id="lista"></div>

<div class="player">
<iframe id="player" allow="autoplay"></iframe>
</div>

<script>

/* BASE GRANDE (SEM BUG) */
const base=[];
const ids=["RgKAFK5djSk","OPf0YbXqDm0","jfKfPfyJRdk","JGwWNGJdvx8","kXYiU_JCYtU","fLexgOxsZu0"];
const generosLista=["rap","funk","pop","rock","trap","lofi"];

for(let i=0;i<200;i++){
base.push({
t:generosLista[i%6].toUpperCase()+" "+i,
id:ids[i%6],
g:generosLista[i%6]
});
}

/* CRIAR BOTÕES */
const genDiv=document.getElementById("generos");

generosLista.forEach(g=>{
const b=document.createElement("button");
b.innerText=g.toUpperCase();

b.onclick=()=>{
const filtrado=base.filter(v=>v.g===g);
render(filtrado);
};

genDiv.appendChild(b);
});

/* RENDER */
function render(lista){
const el=document.getElementById("lista");
el.innerHTML="";

lista.forEach(v=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
<h3>${v.t}</h3>
`;

div.onclick=()=>{
document.getElementById("player").src=
`https://www.youtube.com/embed/${v.id}?autoplay=1&playsinline=1`;
};

el.appendChild(div);
});
}

/* INICIAL */
render(base);

/* BUSCA FUNCIONANDO */
function buscar(){
const v=document.getElementById("busca").value.toLowerCase();

const filtrado=base.filter(x=>
x.t.toLowerCase().includes(v)
);

render(filtrado);
}

/* BUSCA AUTOMÁTICA */
document.getElementById("busca").addEventListener("input",buscar);

</script>

</body>
</html>
