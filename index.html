<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monet Vídeos - Pro</title>
    <style>
        :root { --bg: #0f0f0f; --surface: #222; --accent: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: var(--bg); color: #fff; padding-bottom: 180px; }

        header { padding: 20px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        
        .search-container { padding: 15px; display: flex; gap: 10px; }
        #busca { flex: 1; padding: 12px; border-radius: 25px; border: none; background: var(--surface); color: #fff; }

        .feed { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 15px; }
        .card { cursor: pointer; background: #1a1a1a; border-radius: 12px; overflow: hidden; }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #333; }
        .card-info { padding: 12px; }
        .title { font-size: 15px; font-weight: 500; line-height: 1.4; }

        /* PLAYER FIXO EMBAIXO */
        .player-container {
            position: fixed; bottom: 0; width: 100%; background: #000;
            border-top: 2px solid #333; z-index: 1000; display: none;
        }
        .player-active { display: block; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; }
        .controls { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { color: var(--accent); font-weight: bold; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<header>Monet Vídeos</header>

<div class="search-container">
    <input type="text" id="busca" placeholder="Pesquisar vídeos...">
</div>

<div class="feed" id="feed">
    </div>

<div class="player-container" id="container-player">
    <div class="video-wrapper">
        <div id="player-youtube"></div>
    </div>
    <div class="controls">
        <span id="v-titulo-atual">Tocando agora...</span>
        <span class="close-btn" onclick="fecharPlayer()">✖</span>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // Banco de dados de vídeos (Como a API Key é instável, usamos essa lista ultra-rápida)
    const listaVideos = [
        { id: "jfKfPfyJRdk", title: "Natureza Relaxante 8K Ultra HD" },
        { id: "5U7bE06_z7I", title: "Piseiro e Sanfona 2026 - Lançamentos" },
        { id: "4YmXW7XF66o", title: "Desenvolvimento de Apps Profissionais" },
        { id: "dQw4w9WgXcQ", title: "Rick Astley - Never Gonna Give You Up" }
    ];

    let player;

    // Inicializa o Feed
    function carregarFeed() {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        
        listaVideos.forEach(v => {
            const card = document.createElement('div');
            card.className = "card";
            card.onclick = () => abrirVideo(v.id, v.title);
            card.innerHTML = `
                <img class="thumb" src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg">
                <div class="card-info">
                    <div class="title">${v.title}</div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    // API do YouTube
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-youtube', {
            height: '100%',
            width: '100%',
            playerVars: { 'autoplay': 1, 'modestbranding': 1, 'rel': 0 },
            events: {
                'onReady': () => console.log("Player pronto")
            }
        });
    }

    function abrirVideo(id, titulo) {
        const container = document.getElementById('container-player');
        document.getElementById('v-titulo-atual').innerText = titulo;
        
        container.classList.add('player-active');
        
        if (player && player.loadVideoById) {
            player.loadVideoById(id);
        }
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function fecharPlayer() {
        const container = document.getElementById('container-player');
        container.classList.remove('player-active');
        if (player && player.stopVideo) player.stopVideo();
    }

    window.onload = carregarFeed;
</script>

</body>
</html>
