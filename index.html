<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lamoniê Flow Ultra 5K</title>
    <style>
        /* [CAMADA 1: DESIGN SYSTEM] */
        :root {
            --yt-red: #ff0000;
            --bg: #000000;
            --surface: #0f0f0f;
            --text: #ffffff;
            --dim: #aaaaaa;
            --ios-blue: #007aff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* [CAMADA 2: HEADER] */
        .header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: rgba(15,15,15,0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 1000; border-bottom: 1px solid #222;
        }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--yt-red); }

        /* [CAMADA 3: FEED DINÂMICO] */
        #main-scroll {
            height: 100vh; overflow-y: scroll; padding-top: 70px; padding-bottom: 100px;
            -webkit-overflow-scrolling: touch;
        }
        .v-card { width: 100%; margin-bottom: 12px; cursor: pointer; background: var(--surface); }
        .v-thumb { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; position: relative; }
        .v-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .v-meta { display: flex; padding: 12px; gap: 12px; }
        .v-avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; flex-shrink: 0; }
        .v-title { font-size: 15px; font-weight: 500; line-height: 1.4; }

        /* [CAMADA 4: ULTRA PLAYER MODAL] */
        #player-modal {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 2000; display: none; flex-direction: column;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }
        #player-modal.active { display: flex; transform: translateY(0); }
        
        .player-header { height: 50px; display: flex; align-items: center; padding: 0 15px; }
        .player-frame { width: 100%; aspect-ratio: 16/9; background: #000; }
        .player-info { padding: 20px; flex: 1; overflow-y: auto; }

        /* [CAMADA 5: TAB BAR (CORRIGIDA)] */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(10,10,10,0.98); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 3000; /* Fica acima do player se necessário */
            padding-bottom: 15px;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; color: var(--dim); font-size: 10px; gap: 4px; flex: 1; cursor: pointer; }
        .tab-item.active { color: white; }
        .tab-item svg { width: 24px; height: 24px; fill: currentColor; }

        .btn-add { width: 40px; height: 40px; border: 1px solid #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo">Lamoniê <span>Flow</span></div>
        <div class="v-avatar" style="width: 30px; height: 30px; background: #004d40;"></div>
    </header>

    <main id="main-scroll">
        </main>

    <div id="player-modal">
        <div class="player-header" onclick="closeUltraPlayer()">
            <span style="color: var(--ios-blue); font-size: 18px; font-weight: 600;">✕ Fechar</span>
        </div>
        <div class="player-frame">
            <div id="yt-engine"></div>
        </div>
        <div class="player-info">
            <h2 id="p-title" style="font-size: 18px; margin-bottom: 10px;"></h2>
            <p id="p-stats" style="color: var(--dim); font-size: 13px;"></p>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" onclick="location.reload()">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
        </div>
        <div class="tab-item" onclick="alert('Shorts em breve!')">
            <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>Shorts
        </div>
        <div class="btn-add">+</div>
        <div class="tab-item">
            <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z"/></svg>Subs
        </div>
        <div class="tab-item">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>Lib
        </div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // [BANCO DE DADOS DINÂMICO]
        const videoData = [
            { id: "5U7bE06_z7I", title: "O Melhor do Piseiro e Sanfona 2026 - Bibiu Galdino", views: "2.4M" },
            { id: "4YmXW7XF66o", title: "Como Criar Apps no Replit (Tutorial 2026)", views: "150k" },
            { id: "jfKfPfyJRdk", title: "Natureza Relaxante 8K HDR", views: "10M" },
            { id: "dQw4w9WgXcQ", title: "Video de Teste Premium", views: "1.5B" }
        ];

        let player;
        let apiReady = false;

        // [FUNÇÃO DE RENDERIZAÇÃO]
        function loadFeed() {
            const container = document.getElementById('main-scroll');
            videoData.forEach(v => {
                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => openUltraPlayer(v.id, v.title, v.views);
                card.innerHTML = `
                    <div class="v-thumb">
                        <img src="https://i.ytimg.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
                    </div>
                    <div class="v-meta">
                        <div class="v-avatar"></div>
                        <div class="v-title">${v.title}<br>
                        <span style="color:#888; font-size:12px;">Lamoniê Flow • ${v.views} views</span></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // [CONTROLE DO PLAYER]
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-engine', {
                height: '100%', width: '100%',
                playerVars: { 'autoplay': 0, 'controls': 1, 'modestbranding': 1, 'rel': 0 },
                events: { 'onReady': () => { apiReady = true; } }
            });
        }

        function openUltraPlayer(id, title, views) {
            const modal = document.getElementById('player-modal');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-stats').innerText = `${views} visualizações • SINAL PREMIUM`;
            
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
            
            if (apiReady) {
                player.loadVideoById(id);
            }
        }

        function closeUltraPlayer() {
            const modal = document.getElementById('player-modal');
            modal.classList.remove('active');
            if (player && player.stopVideo) player.stopVideo();
            setTimeout(() => { modal.style.display = 'none'; }, 400);
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
