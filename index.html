<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Original - Sem Anúncios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-card:hover { transform: scale(1.03); transition: 0.3s; }
        iframe { width: 100%; aspect-ratio: 16/9; border-radius: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full bg-[#0f0f0f] flex justify-between items-center px-4 py-2 z-50 border-b border-[#222]">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-bars text-xl cursor-pointer hover:bg-[#272727] p-2 rounded-full"></i>
            <div class="flex items-center gap-1 cursor-pointer" onclick="location.reload()">
                <i class="fa-brands fa-youtube text-red-600 text-3xl"></i>
                <span class="font-bold text-xl tracking-tighter">YouTube</span>
            </div>
        </div>
        
        <div class="flex items-center flex-1 max-w-[600px] mx-4">
            <input id="search-input" type="text" placeholder="Pesquisar qualquer vídeo no mundo..." 
                   class="w-full bg-[#121212] border border-[#303030] rounded-l-full py-2 px-5 focus:outline-none focus:border-blue-500 text-sm">
            <button onclick="searchVideos()" class="bg-[#222222] border border-l-0 border-[#303030] rounded-r-full py-2 px-6 hover:bg-[#333]">
                <i class="fa-solid fa-magnifying-glass text-gray-300"></i>
            </button>
        </div>

        <div class="hidden md:flex items-center gap-5 text-xl">
            <i class="fa-solid fa-video cursor-pointer hover:text-red-500"></i>
            <i class="fa-solid fa-bell cursor-pointer"></i>
            <div class="w-8 h-8 bg-gradient-to-tr from-purple-600 to-blue-500 rounded-full flex items-center justify-center text-xs font-bold shadow-lg">B</div>
        </div>
    </nav>

    <div class="fixed top-[56px] w-full bg-[#0f0f0f] py-3 px-4 flex gap-3 overflow-x-auto no-scrollbar z-40 border-b border-[#222]">
        <button onclick="updateSearch('Tudo')" class="bg-white text-black px-4 py-1 rounded-lg text-sm font-semibold whitespace-nowrap">Tudo</button>
        <button onclick="updateSearch('Forró das antigas')" class="bg-[#272727] hover:bg-[#3f3f3f] px-4 py-1 rounded-lg text-sm font-semibold whitespace-nowrap">Forró</button>
        <button onclick="updateSearch('Luiz Gonzaga sanfona')" class="bg-[#272727] hover:bg-[#3f3f3f] px-4 py-1 rounded-lg text-sm font-semibold whitespace-nowrap">Sanfona</button>
        <button onclick="updateSearch('Piseiro 2026')" class="bg-[#272727] hover:bg-[#3f3f3f] px-4 py-1 rounded-lg text-sm font-semibold whitespace-nowrap">Piseiro</button>
        <button onclick="updateSearch('Natureza 4k')" class="bg-[#272727] hover:bg-[#3f3f3f] px-4 py-1 rounded-lg text-sm font-semibold whitespace-nowrap">Natureza</button>
        <button onclick="updateSearch('Noticias Ceará')" class="bg-[#272727] hover:bg-[#3f3f3f] px-4 py-1 rounded-lg text-sm font-semibold whitespace-nowrap">Notícias</button>
    </div>

    <section id="player-section" class="hidden pt-24 w-full max-w-[1000px] mx-auto p-4 animate-fade-in">
        <div id="video-wrapper"></div>
        <div class="mt-4">
            <h2 id="video-title" class="text-xl font-bold md:text-2xl">Carregando...</h2>
            <div class="flex flex-wrap items-center justify-between gap-4 mt-4 bg-[#1a1a1a] p-4 rounded-xl">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-bold">B</div>
                    <div>
                        <p class="font-bold">Canal Premium</p>
                        <p class="text-gray-400 text-xs">100% Sem Propagandas</p>
                    </div>
                </div>
                <button class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition">Inscrever-se</button>
            </div>
        </div>
        <h3 class="text-lg font-semibold mt-8 mb-4 border-l-4 border-red-600 pl-3">Mais sugestões para você:</h3>
    </section>

    <main id="results" class="pt-32 pb-20 px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        </main>

    <script>
        // Função para buscar vídeos direto do YouTube sem precisar de chave paga
        async function searchVideos(customQuery = null) {
            const query = customQuery || document.getElementById('search-input').value;
            if (!query) return;

            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = "<div class='col-span-full text-center py-20 text-gray-400'>Buscando no YouTube...</div>";

            try {
                // Usando uma instância pública do Piped (API alternativa ao YouTube)
                const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await response.json();

                resultsContainer.innerHTML = "";
                
                data.items.forEach(video => {
                    const videoId = video.url.split('=')[1];
                    const card = `
                        <div class="video-card flex flex-col gap-3 cursor-pointer group" onclick="playVideo('${videoId}', '${video.title.replace(/'/g, "\\'")}')">
                            <div class="relative overflow-hidden rounded-xl">
                                <img src="${video.thumbnail}" class="w-full aspect-video object-cover transition duration-500">
                                <span class="absolute bottom-2 right-2 bg-black/90 text-[10px] font-bold px-1.5 py-0.5 rounded">${video.duration ? Math.floor(video.duration/60)+":"+(video.duration%60).toString().padStart(2,'0') : 'HD'}</span>
                            </div>
                            <div class="flex gap-3">
                                <div class="w-9 h-9 bg-gray-800 rounded-full flex-shrink-0 border border-[#333]"></div>
                                <div>
                                    <h3 class="font-bold text-[14px] leading-tight line-clamp-2 group-hover:text-blue-400">${video.title}</h3>
                                    <p class="text-gray-400 text-[12px] mt-1">${video.uploaderName}</p>
                                    <p class="text-gray-400 text-[12px]">${video.viewCount.toLocaleString()} visualizações</p>
                                </div>
                            </div>
                        </div>
                    `;
                    resultsContainer.innerHTML += card;
                });
            } catch (error) {
                resultsContainer.innerHTML = "<div class='col-span-full text-center text-red-500'>Erro na conexão. Tente pesquisar novamente.</div>";
            }
        }

        // Função para tocar o vídeo no topo da página
        function playVideo(id, title) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            const section = document.getElementById('player-section');
            const wrapper = document.getElementById('video-wrapper');
            const titleElem = document.getElementById('video-title');
            const grid = document.getElementById('results');

            section.classList.remove('hidden');
            grid.classList.replace('pt-32', 'pt-10');

            // O segredo do "Sem Anúncios" é o servidor youtube-nocookie
            wrapper.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1&rel=0" 
                                 allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            titleElem.innerText = title;
        }

        // Atalho para as categorias de cima
        function updateSearch(text) {
            document.getElementById('search-input').value = text;
            searchVideos(text);
        }

        // Carrega o site com sucessos musicais de primeira
        window.onload = () => {
            searchVideos("Musica Sertaneja 2026");
        };

        // Permite dar 'Enter' no iPhone para pesquisar
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchVideos();
        });
    </script>
</body>
</html>
