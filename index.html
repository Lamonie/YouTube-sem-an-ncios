<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .active-tab { color: white !important; }
        .bottom-nav { background: rgba(15, 15, 15, 0.98); border-top: 1px solid #272727; }
        .filter-btn { background: #272727; white-space: nowrap; padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 500; }
        .filter-btn.active { background: white; color: black; }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 w-full bg-[#0f0f0f] flex justify-between items-center px-4 py-2 z-50">
        <div class="flex items-center gap-4">
            <i onclick="toggleMenu()" class="fa-solid fa-bars text-xl cursor-pointer"></i>
            <div class="flex items-center gap-1">
                <i class="fa-brands fa-youtube text-red-600 text-2xl"></i>
                <span class="font-bold text-lg tracking-tighter">Premium</span>
            </div>
        </div>
        <div class="flex items-center gap-5 text-xl">
            <i class="fa-solid fa-tower-broadcast"></i>
            <i class="fa-solid fa-bell"></i>
            <i onclick="showSearch()" class="fa-solid fa-magnifying-glass"></i>
            <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">B</div>
        </div>
    </nav>

    <div id="search-bar" class="hidden fixed top-0 left-0 w-full bg-[#0f0f0f] p-3 z-[60] flex gap-2 items-center">
        <i onclick="showSearch()" class="fa-solid fa-arrow-left p-2"></i>
        <input id="q" type="text" placeholder="Pesquisar sem anúncios..." class="flex-1 bg-[#121212] border border-[#333] rounded-full px-4 py-1.5 focus:outline-none">
        <button onclick="buscar()" class="bg-[#272727] p-2 rounded-full px-4">OK</button>
    </div>

    <div class="fixed top-12 w-full bg-[#0f0f0f] py-3 px-4 flex gap-3 overflow-x-auto no-scrollbar z-40">
        <div class="filter-btn active">Tudo</div>
        <div class="filter-btn" onclick="buscar('Notícias')">Notícias</div>
        <div class="filter-btn" onclick="buscar('Piseiro 2026')">Piseiro</div>
        <div class="filter-btn" onclick="buscar('Música')">Música</div>
        <div class="filter-btn" onclick="buscar('Ao vivo')">Ao vivo</div>
    </div>

    <main id="content" class="pt-28 px-4 flex flex-col gap-8">
        </main>

    <div class="bottom-nav fixed bottom-0 w-full flex justify-around items-center py-2 z-50">
        <div class="flex flex-col items-center gap-1 text-[#aaa]" onclick="location.reload()">
            <i class="fa-solid fa-house text-lg active-tab"></i>
            <span class="text-[10px]">Início</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-[#aaa]">
            <i class="fa-solid fa-bolt text-lg"></i>
            <span class="text-[10px]">Shorts</span>
        </div>
        <div class="flex flex-col items-center gap-1">
            <i class="fa-solid fa-circle-plus text-3xl"></i>
        </div>
        <div class="flex flex-col items-center gap-1 text-[#aaa]">
            <i class="fa-solid fa-layer-group text-lg"></i>
            <span class="text-[10px]">Inscrições</span>
        </div>
        <div class="flex flex-col items-center gap-1 text-[#aaa]">
            <i class="fa-solid fa-video-slash text-lg"></i>
            <span class="text-[10px]">Biblioteca</span>
        </div>
    </div>

    <script>
        // Função para remover anúncios: Usamos o player "Piped" ou "Cloudtube" que limpa o sinal
        function play(id, title) {
            window.scrollTo(0,0);
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="animate-in fade-in duration-500">
                    <div class="video-container">
                        <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&showinfo=0&modestbranding=1" allowfullscreen allow="autoplay"></iframe>
                    </div>
                    <h2 class="text-lg font-bold mt-3">${title}</h2>
                    <div class="flex items-center gap-3 mt-4 bg-[#272727] p-3 rounded-xl">
                        <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center font-bold">B</div>
                        <div class="flex-1">
                            <p class="font-bold text-sm">Bibiu Galdino Oficial</p>
                            <p class="text-xs text-gray-400">Premium Ativado</p>
                        </div>
                        <button class="bg-white text-black px-4 py-1.5 rounded-full text-sm font-bold">Inscrever-se</button>
                    </div>
                </div>
                <h3 class="font-bold mt-6">Próximos vídeos</h3>
                <div id="related"></div>
            `;
            carregarSugeridos();
        }

        async function buscar(termo = 'Destaques Brasil 2026') {
            const q = termo || document.getElementById('q').value;
            const container = document.getElementById('content');
            container.innerHTML = "<p class='text-center py-10'>Limpando anúncios e carregando...</p>";
            document.getElementById('search-bar').classList.add('hidden');

            try {
                // API que puxa os dados limpos
                const res = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(q)}&filter=videos`);
                const data = await res.json();
                
                container.innerHTML = "";
                data.items.forEach(v => {
                    const id = v.url.split('=')[1];
                    container.innerHTML += `
                        <div class="flex flex-col gap-3" onclick="play('${id}', '${v.title.replace(/'/g, "")}')">
                            <div class="relative">
                                <img src="${v.thumbnail}" class="w-full aspect-video object-cover rounded-xl">
                                <span class="absolute bottom-2 right-2 bg-black/80 text-[10px] px-1 rounded">${v.duration ? Math.floor(v.duration/60)+":"+(v.duration%60).toString().padStart(2,'0') : 'HD'}</span>
                            </div>
                            <div class="flex gap-3">
                                <div class="w-9 h-9 bg-gray-800 rounded-full flex-shrink-0"></div>
                                <div class="flex-1">
                                    <h3 class="text-sm font-bold leading-tight line-clamp-2">${v.title}</h3>
                                    <p class="text-[#aaa] text-[12px] mt-1">${v.uploaderName} • ${v.viewCount.toLocaleString()} views</p>
                                </div>
                                <i class="fa-solid fa-ellipsis-vertical text-[#aaa]"></i>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                container.innerHTML = "<p class='text-red-500 text-center'>Tente novamente em instantes.</p>";
            }
        }

        function toggleMenu() { alert("Menu Lateral Ativado! Aqui você verá seu histórico e álbuns."); }
        function showSearch() { document.getElementById('search-bar').classList.toggle('hidden'); }

        window.onload = () => buscar();
    </script>
</body>
</html>
