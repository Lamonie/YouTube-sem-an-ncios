<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Vídeos</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
font-family:Arial;
color:#fff;
}

/* HEADER */
header{
padding:15px;
font-size:18px;
font-weight:bold;
}

/* BUSCA */
.search{
display:flex;
padding:10px;
gap:10px;
}

.search input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#222;
color:#fff;
}

.search button{
width:45px;
border:none;
border-radius:50%;
background:#fff;
}

/* CATEGORIAS */
.cats{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.cats::-webkit-scrollbar{display:none;}

.cat{
padding:10px 15px;
background:#222;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
}

.cat.active{
background:#fff;
color:#000;
}

/* FEED */
.feed{
display:flex;
flex-direction:column;
gap:15px;
padding:10px;
}

/* CARD */
.card{
cursor:pointer;
}

.thumb{
width:100%;
border-radius:10px;
}

.title{
font-size:14px;
margin-top:5px;
}

/* MINI PLAYER */
.mini{
position:fixed;
bottom:0;
width:100%;
background:#000;
display:flex;
flex-direction:column;
}

iframe{
width:100%;
height:200px;
border:none;
}

.controls{
display:flex;
justify-content:space-between;
padding:10px;
font-size:14px;
}

</style>
</head>

<body>

<header>Monet Vídeos</header>

<div class="search">
<input id="busca" placeholder="Buscar vídeos...">
<button onclick="buscar()">🔍</button>
</div>

<div class="cats" id="cats"></div>

<div class="feed" id="feed"></div>

<div class="mini">
<iframe id="player"></iframe>
<div class="controls">
<span id="titulo">Nenhum vídeo</span>
<span onclick="fechar()" style="cursor:pointer">✖</span>
</div>
</div>

<script>

const API_KEY="SUA_API_AQUI";

let nextPage="";
let queryAtual="música";

/* CATEGORIAS */
const categorias=["Música","Rap","Funk","Podcast","Notícias","Ao vivo"];

const catDiv=document.getElementById("cats");

categorias.forEach(c=>{
const b=document.createElement("div");
b.className="cat";
b.innerText=c;

b.onclick=()=>{
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
queryAtual=c;
buscar(true);
};

catDiv.appendChild(b);
});

/* BUSCAR */
async function buscar(novo=false){

if(novo){
nextPage="";
document.getElementById("feed").innerHTML="";
}

const query=document.getElementById("busca").value || queryAtual;

const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&maxResults=10&type=video&pageToken=${nextPage}&key=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

nextPage=data.nextPageToken || "";

const feed=document.getElementById("feed");

data.items.forEach(v=>{
const id=v.id.videoId;
const title=v.snippet.title;
const img=v.snippet.thumbnails.medium.url;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img class="thumb" src="${img}">
<div class="title">${title}</div>
`;

div.onclick=()=>{
document.getElementById("player").src=
`https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1`;

document.getElementById("titulo").innerText=title;

/* SALVAR HISTÓRICO */
let hist=JSON.parse(localStorage.getItem("hist")||"[]");
hist.unshift({title,id});
localStorage.setItem("hist",JSON.stringify(hist.slice(0,20)));
};

feed.appendChild(div);
});

}

/* SCROLL INFINITO */
window.addEventListener("scroll",()=>{
if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200){
buscar();
}
});

/* FECHAR PLAYER */
function fechar(){
document.getElementById("player").src="";
document.getElementById("titulo").innerText="Nenhum vídeo";
}

/* BUSCA AUTOMÁTICA */
document.getElementById("busca").addEventListener("input",()=>{
buscar(true);
});

/* INICIAL */
buscar(true);

</script>

</body>
</html>
