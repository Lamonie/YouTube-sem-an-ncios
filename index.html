<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>YouTube Premium - Bibiu Galdino</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-fundo: #0f0f0f;
            --cor-texto: #f1f1f1;
            --cor-cinza: #aaa;
            --cor-premium: #ff0000;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            margin: 0;
            font-family: 'Roboto', sans-serif;
            padding-bottom: 70px;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            background: var(--cor-fundo);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 18px; }
        .logo-icon { color: var(--cor-premium); font-size: 24px; }

        /* VÍDEOS */
        .video-card { width: 100%; margin-bottom: 20px; cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 4px; font-size: 12px; }
        
        .details { display: flex; padding: 12px; gap: 12px; }
        .avatar { width: 36px; height: 36px; background: #5a3ab6; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .info h3 { margin: 0; font-size: 14px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { color: var(--cor-cinza); font-size: 12px; margin-top: 4px; }

        /* PLAYER OVERLAY */
        .player-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column; z-index: 1000;
        }
        .player-overlay.active { display: flex; }
        .close-btn { padding: 15px; color: white; font-size: 20px; cursor: pointer; background: #111; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* NAV BAIXO */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: var(--cor-fundo); border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--cor-cinza); text-decoration: none; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo"><span class="logo-icon">▶</span> Premium</div>
        <div style="display: flex; gap: 15px;">
            <span>🔔</span>
            <span>🔍</span>
            <div class="avatar" style="width: 28px; height: 28px; font-size: 12px;">B</div>
        </div>
    </header>

    <main id="video-list"></main>

    <div class="player-overlay" id="player">
        <div class="close-btn" onclick="closeVideo()">✕ Fechar Vídeo</div>
        <div id="iframe-container"></div>
    </div>

    <nav class="nav-bar">
        <a href="#" class="nav-item active">🏠<span>Início</span></a>
        <a href="#" class="nav-item">⚡<span>Shorts</span></a>
        <div style="font-size: 30px;">⊕</div>
        <a href="#" class="nav-item">📺<span>Inscrições</span></a>
        <a href="#" class="nav-item">📚<span>Biblioteca</span></a>
    </nav>

    <script>
        // Dados Reais do YouTube para testar
        const videos = [
            { id: "5U7bE06_z7I", title: "O Melhor do Piseiro e Sanfona 2026 - Especial Bibiu", views: "1M", time: "3 dias", channel: "Canal Oficial" },
            { id: "jfKfPfyJRdk", title: "Natureza em 8K - Vídeo para Testar sua Tela", views: "500k", time: "1 semana", channel: "Mundo Natureza" },
            { id: "dQw4w9WgXcQ", title: "Top Músicas Internacionais - Sem Ads", views: "2B", time: "1 ano", channel: "Vevo Music" }
        ];

        const container = document.getElementById('video-list');

        function renderVideos() {
            videos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openVideo(v.id);
                card.innerHTML = `
                    <div class="thumbnail">
                        <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg">
                        <span class="duration">10:00</span>
                    </div>
                    <div class="details">
                        <div class="avatar">B</div>
                        <div class="info">
                            <h3>${v.title}</h3>
                            <div class="meta">${v.channel} • ${v.views} views • há ${v.time}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openVideo(id) {
            const player = document.getElementById('player');
            const iframeCon = document.getElementById('iframe-container');
            player.classList.add('active');
            iframeCon.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const player = document.getElementById('player');
            document.getElementById('iframe-container').innerHTML = '';
            player.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        renderVideos();
    </script>
</body>
</html>
