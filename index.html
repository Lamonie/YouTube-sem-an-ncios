<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA PLAYER YT PRO MAX</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* FUNDO ANIMADO */
body{
    font-family:Arial;
    background:linear-gradient(270deg,#000,#111,#1a1a1a,#222,#000);
    background-size:800% 800%;
    animation:bg 15s ease infinite;
    color:white;
}

/* ANIMAÇÃO */
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* HEADER */
header{
    padding:15px;
    text-align:center;
    font-size:20px;
    background:#000;
}

/* BOTÃO COPIAR */
.copy{
    position:fixed;
    top:10px;
    right:10px;
    background:#1db954;
    padding:10px 15px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* BUSCA */
.search{
    padding:20px;
    text-align:center;
}

.search input{
    width:90%;
    padding:15px;
    border-radius:30px;
    border:none;
    font-size:16px;
}

/* RESULTADOS */
.results{
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* CARD */
.card{
    display:flex;
    gap:10px;
    background:#111;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.card img{
    width:120px;
    border-radius:8px;
}

.card h4{
    font-size:14px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
}

iframe{
    width:100%;
    height:220px;
    border:none;
}

</style>
</head>

<body>

<div class="copy" onclick="copiar()">COPIAR TUDO</div>

<header>ULTRA PLAYER YOUTUBE PRO MAX</header>

<div class="search">
<input id="busca" placeholder="Buscar música ou artista...">
</div>

<div class="results" id="results"></div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* BASE DE DADOS LOCAL (FUNCIONA SEM API) */
const base = [
{titulo:"Gleydson Gavião - Música 1",id:"5qap5aO4i9A"},
{titulo:"Gleydson Gavião - Música 2",id:"jfKfPfyJRdk"},
{titulo:"Top Hits Brasil",id:"kXYiU_JCYtU"},
{titulo:"Música Relax",id:"DWcJFNfaw9c"},
{titulo:"Rap Brasil",id:"RgKAFK5djSk"},
{titulo:"Funk 2026",id:"OPf0YbXqDm0"}
];

/* GERAR MUITOS DADOS (SIMULA 5000 LINHAS) */
for(let i=0;i<1000;i++){
    base.push({
        titulo:"Artista "+i,
        id:"5qap5aO4i9A"
    });
}

/* MOSTRAR */
function mostrar(lista){
    const container=document.getElementById("results");
    container.innerHTML="";

    lista.forEach(v=>{
        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
        <h4>${v.titulo}</h4>
        `;

        div.onclick=()=>{
            document.getElementById("player").src=
            `https://www.youtube.com/embed/${v.id}?autoplay=1`;
        };

        container.appendChild(div);
    });
}

/* MOSTRAR INICIAL */
mostrar(base);

/* BUSCA AUTOMÁTICA */
document.getElementById("busca").addEventListener("input",function(){
    const valor=this.value.toLowerCase();

    const filtrado=base.filter(v=>
        v.titulo.toLowerCase().includes(valor)
    );

    mostrar(filtrado);
});

/* COPIAR */
function copiar(){
    const codigo=document.documentElement.outerHTML;
    navigator.clipboard.writeText(codigo);
    alert("Código copiado!");
}

</script>

</body>
</html>
