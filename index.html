<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monet Vídeos</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* FUNDO */
body{
font-family:Arial;
background:linear-gradient(270deg,#000,#111,#1a1a1a,#000);
background-size:600% 600%;
animation:bg 12s infinite;
color:#fff;
padding-bottom:240px;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* HEADER */
header{
padding:15px;
text-align:center;
font-size:20px;
background:#000;
}

/* BUSCA */
.search{
display:flex;
justify-content:center;
gap:8px;
padding:15px;
}

.search input{
width:65%;
padding:12px;
border-radius:25px;
border:none;
font-size:14px;
}

.search button{
padding:12px;
border:none;
border-radius:50%;
background:#1db954;
color:#fff;
font-size:16px;
cursor:pointer;
}

/* GENEROS */
.generos{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.generos button{
background:#111;
border:none;
color:#fff;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
transition:0.3s;
}

.generos button:hover{
background:#1db954;
}

/* LISTA */
.lista{
padding:10px;
display:flex;
flex-direction:column;
gap:12px;
}

/* CARD */
.card{
display:flex;
gap:10px;
background:#111;
border-radius:10px;
padding:10px;
cursor:pointer;
}

.card img{
width:120px;
border-radius:8px;
}

.card h3{
font-size:14px;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#000;
z-index:999;
}

iframe{
width:100%;
height:220px;
border:none;
}

</style>
</head>

<body>

<header>Monet Vídeos</header>

<!-- BUSCA -->
<div class="search">
<input id="busca" placeholder="Buscar música...">
<button onclick="buscar()">🔍</button>
</div>

<!-- GENEROS -->
<div class="generos" id="generos"></div>

<!-- RESULTADOS -->
<div class="lista" id="lista"></div>

<!-- PLAYER -->
<div class="player">
<iframe id="player" allow="autoplay"></iframe>
</div>

<script>

/* BASE SEM REPETIÇÃO */
const base=[
{t:"Rap Brasil",id:"RgKAFK5djSk",g:"rap"},
{t:"Funk Hits",id:"OPf0YbXqDm0",g:"funk"},
{t:"Lo-fi relax",id:"jfKfPfyJRdk",g:"lofi"},
{t:"Pop mundial",id:"JGwWNGJdvx8",g:"pop"},
{t:"Rock clássico",id:"kXYiU_JCYtU",g:"rock"},
{t:"Trap Brasil",id:"fLexgOxsZu0",g:"trap"}
];

/* GERAR MAIS SEM REPETIR ID */
for(let i=0;i<200;i++){
base.push({
t:"Artista "+i,
id:["jfKfPfyJRdk","RgKAFK5djSk","OPf0YbXqDm0"][i%3],
g:["rap","funk","pop"][i%3]
});
}

/* PEGAR GENEROS UNICOS */
const generosUnicos=[...new Set(base.map(v=>v.g))];

/* CRIAR BOTÕES */
const genDiv=document.getElementById("generos");

generosUnicos.forEach(g=>{
const b=document.createElement("button");
b.innerText=g.toUpperCase();

b.onclick=()=>{
const filtrado=base.filter(v=>v.g===g);
render(filtrado);
};

genDiv.appendChild(b);
});

/* MOSTRAR */
function render(lista){
const el=document.getElementById("lista");
el.innerHTML="";

const usados=new Set();

lista.forEach(v=>{
if(usados.has(v.id)) return;
usados.add(v.id);

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
<h3>${v.t}</h3>
`;

div.onclick=()=>{
document.getElementById("player").src=
`https://www.youtube.com/embed/${v.id}?autoplay=1&playsinline=1`;
};

el.appendChild(div);
});
}

render(base);

/* BUSCAR */
function buscar(){
const v=document.getElementById("busca").value.toLowerCase();

const filtrado=base.filter(x=>
x.t.toLowerCase().includes(v)
);

render(filtrado);
}

</script>

</body>
</html>
