<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA YT PLAYER PRO</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* FUNDO */
body{
    font-family:Arial;
    background:linear-gradient(270deg,#000,#111,#1a1a1a,#222);
    background-size:600% 600%;
    animation:bg 12s infinite;
    color:white;
}

@keyframes bg{
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

/* HEADER */
header{
    padding:15px;
    text-align:center;
    font-size:20px;
    background:#000;
}

/* BUSCA */
.search{
    padding:15px;
    text-align:center;
}

.search input{
    width:80%;
    padding:12px;
    border-radius:30px;
    border:none;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:#111;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{transform:scale(1.05)}

.card img{width:100%}

.card h4{padding:10px;font-size:14px}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#000;
    padding:10px;
}

/* BOTÃO COPIAR */
.copy{
    position:fixed;
    top:10px;
    right:10px;
    background:#1db954;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

iframe{
    width:100%;
    height:220px;
    border:none;
}

</style>
</head>

<body>

<div class="copy" onclick="copiar()">COPIAR TUDO</div>

<header>ULTRA YOUTUBE PLAYER PRO</header>

<div class="search">
<input id="busca" placeholder="Buscar vídeos...">
</div>

<div class="grid" id="resultados"></div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* COLOQUE SUA API AQUI */
const API_KEY = "SUA_API_AQUI";

/* BUSCAR VIDEOS */
async function buscar(q){
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=20&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    const grid = document.getElementById("resultados");
    grid.innerHTML = "";

    data.items.forEach(v=>{
        const id = v.id.videoId;
        const titulo = v.snippet.title;
        const img = v.snippet.thumbnails.medium.url;

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <img src="${img}">
            <h4>${titulo}</h4>
        `;

        div.onclick = ()=>{
            document.getElementById("player").src =
            `https://www.youtube.com/embed/${id}?autoplay=1`;
        };

        grid.appendChild(div);
    });
}

/* EVENTO BUSCA */
document.getElementById("busca").addEventListener("keyup", e=>{
    if(e.key==="Enter"){
        buscar(e.target.value);
    }
});

/* COPIAR */
function copiar(){
    const codigo = document.documentElement.outerHTML;
    navigator.clipboard.writeText(codigo);
    alert("Copiado!");
}

</script>

</body>
</html>
