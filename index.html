<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lamoniê Flow - Real API Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-bg: #0f0f0f;
            --cor-surface: #1e1e1e;
            --cor-primaria: #ff0000;
            --cor-texto: #ffffff;
            --cor-subtexto: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--cor-bg);
            color: var(--cor-texto);
            font-family: 'Roboto', sans-serif;
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* HEADER REALÍSTICO */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--cor-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #282828;
        }

        .logo-box { display: flex; align-items: center; gap: 4px; font-weight: bold; font-size: 20px; color: #fff; text-decoration: none; }
        .logo-box span { color: var(--cor-primaria); font-size: 26px; }

        /* FEED DE VÍDEOS */
        .container { display: flex; flex-direction: column; width: 100%; }
        .video-item { width: 100%; margin-bottom: 20px; cursor: pointer; transition: opacity 0.2s; }
        .video-item:active { opacity: 0.7; }
        
        .thumb-wrap { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-info { display: flex; padding: 12px; gap: 12px; }
        .chan-icon { width: 40px; height: 40px; border-radius: 50%; background: #333; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .text-info { flex-grow: 1; }
        .v-title { font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .v-meta { font-size: 12px; color: var(--cor-subtexto); }

        /* PLAYER DE ALTA PERFORMANCE (OVERLAY) */
        #player-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none; flex-direction: column;
        }
        #player-screen.active { display: flex; }
        
        .player-controls { padding: 15px; background: #111; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .btn-fechar { font-size: 22px; cursor: pointer; color: #fff; }

        #video-embed-box { width: 100%; background: #000; }
        .video-desc-box { padding: 20px; }
        .tag-premium { background: var(--cor-primaria); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-bottom: 10px; display: inline-block; }

        /* NAV INFERIOR */
        .bottom-bar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: var(--cor-bg); border-top: 1px solid #282828;
            display: flex; justify-content: space-around; align-items: center;
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--cor-subtexto); text-decoration: none; gap: 4px; }
        .nav-btn.active { color: #fff; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo-box"><span>▶</span> Premium</a>
        <div style="display: flex; gap: 18px;">
            <span>🔔</span><span>🔍</span>
            <div class="chan-icon" style="width: 28px; height: 28px; font-size: 12px; background: #004d40;">B</div>
        </div>
    </nav>

    <main class="container" id="main-feed"></main>

    <div id="player-screen">
        <div class="player-controls" onclick="stopVideo()">
            <span class="btn-fechar">✕</span>
            <span style="font-weight: 500;">Modo Premium Ativo</span>
        </div>
        <div id="video-embed-box">
            <div id="youtube-api-player"></div>
        </div>
        <div class="video-desc-box">
            <span class="tag-premium">SEM ANÚNCIOS</span>
            <h2 id="current-title" style="font-size: 18px; margin-bottom: 8px;">Carregando...</h2>
            <p id="current-chan" style="color: #aaa; font-size: 14px;"></p>
        </div>
    </div>

    <nav class="bottom-bar">
        <div class="nav-btn active">🏠<span>Início</span></div>
        <div class="nav-btn">⚡<span>Shorts</span></div>
        <div style="font-size: 32px; font-weight: 200;">⊕</div>
        <div class="nav-btn">📺<span>Inscrições</span></div>
        <div class="nav-btn">📚<span>Biblioteca</span></div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // Dados reais de IDs do YouTube
        const playlist = [
            { id: "5U7bE06_z7I", title: "Piseiro e Sanfona 2026 - O Som do Nordeste", channel: "Bibiu Galdino Oficial" },
            { id: "4YmXW7XF66o", title: "Curso de Programação Web Profissional", channel: "Dev Master" },
            { id: "jfKfPfyJRdk", title: "Natureza 8K - Ultra Realismo", channel: "Canais HD" },
            { id: "dQw4w9WgXcQ", title: "Rick Astley - Premium Quality", channel: "Vevo" }
        ];

        let player;
        const feed = document.getElementById('main-feed');

        // Renderiza o Feed Real
        function loadFeed() {
            playlist.forEach(v => {
                const item = document.createElement('div');
                item.className = 'video-item';
                item.onclick = () => playVideo(v.id, v.title, v.channel);
                item.innerHTML = `
                    <div class="thumb-wrap">
                        <img src="https://i.ytimg.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
                    </div>
                    <div class="video-info">
                        <div class="chan-icon">${v.channel.charAt(0)}</div>
                        <div class="text-info">
                            <h3 class="v-title">${v.title}</h3>
                            <div class="v-meta">${v.channel} • 1.5M visualizações</div>
                        </div>
                    </div>
                `;
                feed.appendChild(item);
            });
        }

        // Inicializa a API do Player
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-api-player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'origin': window.location.origin
                }
            });
        }

        function playVideo(id, title, channel) {
            document.getElementById('player-screen').classList.add('active');
            document.getElementById('current-title').innerText = title;
            document.getElementById('current-chan').innerText = channel;
            
            if (player && player.loadVideoById) {
                player.loadVideoById(id);
            }
            document.body.style.overflow = 'hidden';
        }

        function stopVideo() {
            document.getElementById('player-screen').classList.remove('active');
            if (player && player.stopVideo) {
                player.stopVideo();
            }
            document.body.style.overflow = 'auto';
        }

        window.onload = loadFeed;
    </script>
</body>
</html>
