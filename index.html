<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; }
        iframe { width: 100%; height: 100%; border-radius: 12px; border: none; }
        .bottom-nav { background: #0f0f0f; border-top: 1px solid #272727; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
        .card-video { cursor: pointer; transition: 0.2s; }
        .card-video:active { opacity: 0.5; }
    </style>
</head>
<body class="pb-24">

    <nav class="fixed top-0 w-full bg-[#0f0f0f] flex justify-between items-center px-4 py-2 z-50">
        <div class="flex items-center gap-4">
            <i class="fa-solid fa-bars text-xl" onclick="alert('Menu em manutenção')"></i>
            <div class="flex items-center gap-1">
                <i class="fa-brands fa-youtube text-red-600 text-2xl"></i>
                <span class="font-bold text-lg tracking-tighter">Premium</span>
            </div>
        </div>
        <div class="flex items-center gap-5">
            <i class="fa-solid fa-tower-broadcast"></i>
            <i class="fa-solid fa-bell"></i>
            <i class="fa-solid fa-magnifying-glass"></i>
            <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">B</div>
        </div>
    </nav>

    <div id="reproduzir" class="hidden pt-14 px-2">
        <div class="video-box" id="player-div"></div>
        <h2 id="titulo-video" class="text-lg font-bold mt-3 px-2"></h2>
        <div class="flex items-center gap-3 p-3 bg-[#272727] rounded-xl mt-3 mx-2">
            <div class="w-9 h-9 bg-red-600 rounded-full flex items-center justify-center">B</div>
            <div class="flex-1 text-sm"><b>Bibiu Galdino</b><br><span class="text-gray-400 text-xs">Sem propagandas</span></div>
            <button class="bg-white text-black px-4 py-1 rounded-full font-bold text-xs">Inscrever-se</button>
        </div>
    </div>

    <div id="filtros" class="pt-14 px-4 flex gap-3 overflow-x-auto no-scrollbar py-4">
        <button class="bg-white text-black px-4 py-1 rounded-lg text-sm font-bold">Tudo</button>
        <button class="bg-[#272727] px-4 py-1 rounded-lg text-sm font-bold whitespace-nowrap">Piseiro 2026</button>
        <button class="bg-[#272727] px-4 py-1 rounded-lg text-sm font-bold">Sanfona</button>
        <button class="bg-[#272727] px-4 py-1 rounded-lg text-sm font-bold">Notícias</button>
    </div>

    <main id="lista" class="px-4 flex flex-col gap-8">
        
        <div class="card-video" onclick="tocar('5U7bE06_z7I', 'O Melhor do Piseiro e Sanfona 2026')">
            <img src="https://img.youtube.com/vi/5U7bE06_z7I/maxresdefault.jpg" class="w-full rounded-xl aspect-video object-cover">
            <div class="flex gap-3 mt-3">
                <div class="w-10 h-10 bg-gray-800 rounded-full"></div>
                <div>
                    <h3 class="text-sm font-bold leading-tight">O Melhor do Piseiro e Sanfona 2026 - Especial Bibiu</h3>
                    <p class="text-gray-400 text-xs mt-1">Canal Oficial • 1M views</p>
                </div>
            </div>
        </div>

        <div class="card-video" onclick="tocar('jfKfPfyJRdk', 'Natureza em 8K - Vídeo para Testar sua Tela')">
            <img src="https://img.youtube.com/vi/jfKfPfyJRdk/maxresdefault.jpg" class="w-full rounded-xl aspect-video object-cover">
            <div class="flex gap-3 mt-3">
                <div class="w-10 h-10 bg-gray-800 rounded-full"></div>
                <div>
                    <h3 class="text-sm font-bold leading-tight">Natureza em 8K - Vídeo para Testar sua Tela</h3>
                    <p class="text-gray-400 text-xs mt-1">Mundo Natureza • 500k views</p>
                </div>
            </div>
        </div>

        <div class="card-video" onclick="tocar('dQw4w9WgXcQ', 'Top Músicas Internacionais - Sem Ads')">
            <img src="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg" class="w-full rounded-xl aspect-video object-cover">
            <div class="flex gap-3 mt-3">
                <div class="w-10 h-10 bg-gray-800 rounded-full"></div>
                <div>
                    <h3 class="text-sm font-bold leading-tight">Top Músicas Internacionais - Sem Ads</h3>
                    <p class="text-gray-400 text-xs mt-1">Vevo Music • 2B views</p>
                </div>
            </div>
        </div>

    </main>

    <div class="bottom-nav">
        <div class="flex flex-col items-center text-white" onclick="location.reload()">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px]">Início</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-bolt text-lg"></i>
            <span class="text-[10px]">Shorts</span>
        </div>
        <i class="fa-solid fa-circle-plus text-3xl"></i>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-layer-group text-lg"></i>
            <span class="text-[10px]">Inscrições</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-video text-lg"></i>
            <span class="text-[10px]">Biblioteca</span>
        </div>
    </div>

    <script>
        function tocar(id, titulo) {
            document.getElementById('reproduzir').classList.remove('hidden');
            document.getElementById('filtros').classList.add('hidden');
            document.getElementById('player-div').innerHTML = `
                <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&modestbranding=1&rel=0&iv_load_policy=3" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            `;
            document.getElementById('titulo-video').innerText = titulo;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
