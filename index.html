<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lamoniê Flow Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* CONFIGURAÇÕES GERAIS - ESTILO IPHONE 13 PRO MAX */
        :root {
            --bg: #0f0f0f;
            --surface: #1f1f1f;
            --accent: #ff0000;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --safe-top: env(safe-area-inset-top);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
            padding-top: var(--safe-top);
        }

        /* HEADER PREMIUM */
        .app-bar {
            position: sticky;
            top: 0;
            height: 60px;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .brand-logo { font-size: 22px; font-weight: 700; letter-spacing: -1px; display: flex; align-items: center; gap: 5px; }
        .brand-logo span { color: var(--accent); font-size: 28px; }

        /* FEED DE VÍDEOS REALISTA */
        .feed-container { padding-bottom: 80px; }
        
        .v-card { width: 100%; margin-bottom: 25px; animation: slideUp 0.6s ease-out; }
        
        .v-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #222;
            position: relative;
            overflow: hidden;
        }
        .v-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        
        .v-details { display: flex; padding: 15px; gap: 12px; }
        .v-avatar { 
            width: 40px; height: 40px; border-radius: 50%; 
            background: linear-gradient(135deg, #6e8efb, #a7a7a7);
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 1px solid #333;
        }
        
        .v-info { flex: 1; }
        .v-title { font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 5px; color: #fff; }
        .v-stats { font-size: 13px; color: var(--text-sub); }

        /* PLAYER ENGINE (O CORAÇÃO DO CÓDIGO) */
        #player-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #player-overlay.active { display: flex; }

        .player-header {
            padding: 15px; background: #111; display: flex; 
            align-items: center; gap: 15px; font-weight: 500;
            border-bottom: 1px solid #222;
        }
        .close-icon { font-size: 24px; cursor: pointer; }

        .player-body { flex: 1; display: flex; align-items: center; background: #000; position: relative; }
        #yt-api-frame { width: 100%; aspect-ratio: 16/9; border: none; }

        .video-meta-box { padding: 20px; background: var(--bg); }
        .status-pill { 
            background: #ff0000; color: #fff; padding: 2px 10px; 
            border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: inline-block;
        }

        /* BARRA DE NAVEGAÇÃO INFERIOR */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: var(--bg); border-top: 1px solid #282828;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: var(--text-sub); gap: 6px; }
        .tab-item.active { color: #fff; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="app-bar">
        <div class="brand-logo"><span>▶</span> Lamoniê Flow</div>
        <div style="display: flex; gap: 20px;">
            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <div class="v-avatar" style="width: 28px; height: 28px; font-size: 12px; background: #004d40;">B</div>
        </div>
    </nav>

    <main class="feed-container" id="video-feed"></main>

    <div id="player-overlay">
        <div class="player-header" onclick="closePlayer()">
            <span class="close-icon">✕</span>
            <span>Premium Player Mode</span>
        </div>
        <div class="player-body">
            <div id="yt-api-player"></div>
        </div>
        <div class="video-meta-box">
            <div class="status-pill">SINAL PREMIUM ATIVO</div>
            <h2 id="p-title" style="margin-bottom: 10px;">Título do Vídeo</h2>
            <p id="p-chan" style="color: #aaa; font-size: 14px;"></p>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active">🏠<span>Home</span></div>
        <div class="tab-item">⚡<span>Shorts</span></div>
        <div style="font-size: 30px; font-weight: 200;">⊕</div>
        <div class="tab-item">📺<span>Subs</span></div>
        <div class="tab-item">📚<span>Lib</span></div>
    </nav>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // LISTA DE VÍDEOS REAIS
        const myVideos = [
            { id: "5U7bE06_z7I", title: "O Melhor do Piseiro 2026 - Bibiu Galdino", channel: "Lamoniê Music", views: "1.2M", time: "3 dias" },
            { id: "4YmXW7XF66o", title: "Desenvolvimento de Apps com Replit", channel: "Dev Pro", views: "250k", time: "1 mês" },
            { id: "jfKfPfyJRdk", title: "Natureza Relaxante 8K Ultra HD", channel: "Cinematic World", views: "5.4M", time: "2 semanas" },
            { id: "dQw4w9WgXcQ", title: "Video de Teste Premium", channel: "System", views: "1.5B", time: "12 anos" }
        ];

        let ytPlayer;

        // Renderizar o Feed
        function renderFeed() {
            const feed = document.getElementById('video-feed');
            myVideos.forEach(v => {
                const card = document.createElement('div');
                card.className = 'v-card';
                card.onclick = () => openPlayer(v.id, v.title, v.channel);
                card.innerHTML = `
                    <div class="v-thumbnail">
                        <img src="https://i.ytimg.com/vi/${v.id}/maxresdefault.jpg" onerror="this.src='https://i.ytimg.com/vi/${v.id}/hqdefault.jpg'">
                    </div>
                    <div class="v-details">
                        <div class="v-avatar">B</div>
                        <div class="v-info">
                            <h3 class="v-title">${v.title}</h3>
                            <div class="v-stats">${v.channel} • ${v.views} views • ${v.time}</div>
                        </div>
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // Iniciar API do YouTube
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-api-player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'modestbranding': 1,
                    'rel': 0,
                    'origin': window.location.origin
                }
            });
        }

        function openPlayer(id, title, channel) {
            document.getElementById('player-overlay').classList.add('active');
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-chan').innerText = channel;
            
            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(id);
            }
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('player-overlay').classList.remove('active');
            if (ytPlayer && ytPlayer.stopVideo) {
                ytPlayer.stopVideo();
            }
            document.body.style.overflow = 'auto';
        }

        window.onload = renderFeed;
    </script>
</body>
</html>
