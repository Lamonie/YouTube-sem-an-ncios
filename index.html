<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Monet Vídeos</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f0f">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
background:#0f0f0f;
color:#fff;
font-family:Arial;
}

/* HEADER */
header{
padding:15px;
font-size:18px;
font-weight:bold;
}

/* BUSCA */
.search{
display:flex;
padding:10px;
gap:10px;
}

.search input{
flex:1;
padding:12px;
border-radius:25px;
border:none;
background:#222;
color:#fff;
}

.search button{
width:45px;
border:none;
border-radius:50%;
background:#fff;
}

/* CATEGORIAS */
.cats{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.cats::-webkit-scrollbar{display:none;}

.cat{
padding:10px 15px;
background:#222;
border-radius:20px;
white-space:nowrap;
}

.cat.active{
background:#fff;
color:#000;
}

/* FEED */
.feed{
display:flex;
flex-direction:column;
gap:15px;
padding:10px;
}

/* CARD */
.card{
cursor:pointer;
}

.thumb{
width:100%;
border-radius:10px;
}

.title{
font-size:14px;
margin-top:5px;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
background:#000;
}

iframe{
width:100%;
height:200px;
border:none;
}

</style>

</head>

<body>

<header>Monet Vídeos</header>

<div class="search">
<input id="busca" placeholder="Buscar vídeos...">
<button onclick="buscar()">🔍</button>
</div>

<div class="cats" id="cats"></div>

<div class="feed" id="feed"></div>

<div class="player">
<iframe id="player"></iframe>
</div>

<script>

/* API */
const API_KEY="SUA_API_AQUI";

const categorias=["Música","Rap","Funk","Podcast","Notícias","Ao vivo"];

const catDiv=document.getElementById("cats");

categorias.forEach(c=>{
const b=document.createElement("div");
b.className="cat";
b.innerText=c;

b.onclick=()=>{
document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
buscar(c);
};

catDiv.appendChild(b);
});

/* BUSCAR */
async function buscar(q){
const query=q || document.getElementById("busca").value;

const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&maxResults=10&type=video&key=${API_KEY}`;

const res=await fetch(url);
const data=await res.json();

const feed=document.getElementById("feed");
feed.innerHTML="";

data.items.forEach(v=>{
const id=v.id.videoId;
const title=v.snippet.title;
const img=v.snippet.thumbnails.medium.url;

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img class="thumb" src="${img}">
<div class="title">${title}</div>
`;

div.onclick=()=>{
document.getElementById("player").src=
`https://www.youtube.com/embed/${id}?autoplay=1`;
};

feed.appendChild(div);
});
}

buscar("música");

</script>

</body>
</html>

    }
